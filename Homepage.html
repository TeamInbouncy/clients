<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freelance HubSpot Consultant | AI-First CRM & Automation Expert</title>
  <meta name="description" content="Work with Ebarak — The HubSpot Scientist. Expert Freelance HubSpot Consultant helping businesses automate CRM and grow with AI-powered HubSpot solutions.">
  <link rel="icon" type="image/svg+xml" href="assets/mark.svg">
  <link rel="stylesheet" href="colors_and_type.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { margin: 0; padding: 0; background: var(--bg); scroll-behavior: smooth; }
    #root { min-height: 100vh; }
    * { box-sizing: border-box; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Icon.jsx"></script>
  <script type="text/babel" src="components/Button.jsx"></script>
  <script type="text/babel" src="components/Header.jsx"></script>
  <script type="text/babel" src="components/Footer.jsx"></script>
  <script type="text/babel" src="sections/HomeTop.jsx"></script>
  <script type="text/babel" src="sections/HomeMid.jsx"></script>
  <script type="text/babel" src="sections/HomeBot.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>

  <script type="text/babel">
    const waitForGlobals = () => {
      if (window.App && window.Header && window.Footer && window.HomeTop && window.HomeMid && window.HomeBot) {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
      } else {
        setTimeout(waitForGlobals, 30);
      }
    };
    waitForGlobals();
  </script>
</body>
</html>
